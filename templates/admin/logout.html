{% load i18n static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Logged Out | Sales and Reporting System</title>
    <link rel="stylesheet" href="{% static "vendor/fontawesome-free/css/all.min.css" %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 50%, #cbd5e1 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .logout-wrapper {
            width: 100%;
            max-width: 440px;
            text-align: center;
            animation: fadeInUp 0.5s ease-out;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .brand-logo {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(30, 64, 175, 0.25);
        }
        .brand-logo i { font-size: 28px; color: #fff; }
        .brand-name { font-size: 22px; font-weight: 700; color: #1e293b; margin-bottom: 6px; }
        .logout-card {
            background: #fff;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            padding: 36px 32px;
            margin-top: 24px;
        }
        .logout-icon {
            width: 56px; height: 56px;
            background: #f0fdf4;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }
        .logout-icon i { font-size: 24px; color: #16a34a; }
        .logout-title { font-size: 20px; font-weight: 600; color: #1e293b; margin-bottom: 8px; }
        .logout-msg { font-size: 14px; color: #64748b; margin-bottom: 24px; line-height: 1.5; }
        .btn-login {
            display: inline-block;
            height: 46px; line-height: 46px;
            padding: 0 32px;
            background: linear-gradient(135deg, #1e40af, #2563eb);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.2s, box-shadow 0.2s;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #1e3a8a, #1d4ed8);
            box-shadow: 0 4px 16px rgba(30, 64, 175, 0.3);
            color: #fff;
        }
        .login-footer {
            margin-top: 28px;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
<div class="logout-wrapper">
    <div class="brand-logo"><i class="fas fa-chart-line"></i></div>
    <div class="brand-name">Sales and Reporting System</div>
    <div class="logout-card">
        <div class="logout-icon"><i class="fas fa-check"></i></div>
        <div class="logout-title">Successfully Logged Out</div>
        <p class="logout-msg">You have been safely signed out of your account.</p>
        <a href="{% url 'admin:index' %}" class="btn-login">Sign In Again</a>
    </div>
    <div class="login-footer">&copy; 2026 Sales and Reporting System. All rights reserved.</div>
</div>
</body>
</html>
